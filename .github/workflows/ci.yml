name: Playwright-project

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
 workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Node.js (required for Playwright + Cucumber)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install all dependencies from package.json
      - name: Install dependencies
        run: npm install

      # 4. Install Playwright browsers (Chrome, Firefox, WebKit)
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 5. Run your Cucumber or Playwright tests
      - name: Run Tests
        run: npm run test

      # 6. Generate Allure Report
      - name: Generate Allure Report
        run: npx allure generate allure-results --clean -o allure-report

      # 7. Upload Allure Report as a downloadable artifact
      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
